<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="marked.min.js"></script>
  <style>
    body { 
      width: 400px; 
      font-family: 'Times New Roman', Times, serif; 
      padding: 0; 
      margin: 0; 
      background: #000000; 
    }
    .header {
      background: #c971eb; 
      padding: 15px; 
      border-bottom: 1px solid #b798ff;
      display: flex; 
      justify-content: space-between; 
      align-items: center;
    }
    .header h2 { 
        font-size: 20px; 
        margin: 0; 
        color: #000000; 
    }
    
    .content-area { 
        padding: 20px; 
    }
    
    #output { 
      background: white; 
      padding: 20px; 
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
      min-height: 200px;
      font-size: 14px; 
      line-height: 1.6; 
      color: #000000;
    }
    
    /* Styling the Markdown inside the output */
    #output h1, #output h2 { 
        font-size: 18px; 
        color: #1a73e8; 
    }
    #output ul { 
        padding-left: 20px; 
    }
    #output li { 
        margin-bottom: 8px; 
    }

    .btn-container { 
        padding: 0 20px 20px; 
    }
    button {
      width: 100%; 
      padding: 12px; 
      background: #c144d1; 
      color: rgb(0, 0, 0);
      border: none; 
      border-radius: 6px; 
      font-weight: 600; 
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover { 
        background: #36404d; 
    }
    #status { 
        font-size: 18px; 
        color: #ffffff; 
        margin-top: 8px; 
        text-align: center; 
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>Editor's Digest</h2>
  </div>
  
  <div class="content-area">
    <div id="output">The summary will appear here in real-time...</div>
    <div id="status">Ready</div>
  </div>

  <div class="btn-container">
    <button id="summarizeBtn">Summarize Page</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
