<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                width: 350px;
                font-family: 'Times New Roman', Times, serif;
                padding: 20px;
                background: #000000;
                color: #333;
            }
            h2 {
                font-size: 18px;
                margin-bottom: 10px;
                color: #1a73e8; 
                border-bottom: 1px solid #eee; 
                padding-bottom: 10px;
            }

            #summarizeBtn {
                width: 100%;
                padding: 12px;
                background: #1a73e8;
                color: white;
            }
            #summarizeBtn:hover{
                background: #333;
            }
            #output {
                min-height: 150px; 
                padding: 10px; 
                border: 1px solid #e0e0e0; 
                border-radius: 6px; 
                font-size: 14px; 
                line-height: 1.6; 
                background: #fafafa;
                white-space: pre-wrap; 
                overflow-y: auto; 
                max-height: 300px;
            }
            .status {
                font-size: 12px;
                color: #666;
                margin-top: 10px;
                font-style: italic;
            }
        </style>
    </head>
    <body>
        <h2>Editor's Digest</h2>
        <button id="summarizeBtn">Summarize Page</button>
        <div id="output">Click the button to start...</div>
        <div id="status" class="status">Idle</div>
        <script src="pop.js"></script>
    </body>
</html>
